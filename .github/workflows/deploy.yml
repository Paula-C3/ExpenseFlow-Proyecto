name: Deploy to Render

on:
  push:
    branches:
      - dev
    tags:
      - 'v*'

jobs:
  build-and-push:
    runs-on: ubuntu-latest
    env:
      FORCE_JAVASCRIPT_ACTIONS_TO_NODE24: true

    steps:
      - name: Checkout repo
        uses: actions/checkout@v4

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v3

      - name: Log in to Docker Hub
        uses: docker/login-action@v2
        with:
          username: ${{ secrets.DOCKERHUB_USERNAME }}
          password: ${{ secrets.DOCKERHUB_TOKEN }}

      - name: Determine image tags
        id: tags
        run: |
          if [[ "${GITHUB_REF}" == "refs/heads/dev" ]]; then
            echo "tag=dev" >> $GITHUB_OUTPUT
          elif [[ "${GITHUB_REF}" == refs/tags/v* ]]; then
            echo "tag=prod" >> $GITHUB_OUTPUT
          else
            echo "tag=latest" >> $GITHUB_OUTPUT
          fi

      - name: Build and push backend image
        uses: docker/build-push-action@v5
        with:
          context: .
          file: backend/Dockerfile        # ← "file" no "dockerfile"
          push: true
          tags: |
            ${{ secrets.DOCKERHUB_USERNAME }}/expenseflow-backend:${{ steps.tags.outputs.tag }}
            ${{ secrets.DOCKERHUB_USERNAME }}/expenseflow-backend:latest

      - name: Build and push frontend image
        uses: docker/build-push-action@v5
        with:
          context: .
          dockerfile: frontend/Dockerfile
          push: true
          tags: |
            ${{ secrets.DOCKERHUB_USERNAME }}/expenseflow-frontend:${{ steps.tags.outputs.tag }}
            ${{ secrets.DOCKERHUB_USERNAME }}/expenseflow-frontend:latest

  trigger-render:
    needs: build-and-push
    runs-on: ubuntu-latest
    if: needs.build-and-push.result == 'success'

    steps:
      - name: Trigger Render deploy
        run: |
          if [[ "${GITHUB_REF}" == "refs/heads/dev" ]]; then
            hook_url="${{ secrets.RENDER_DEV_DEPLOY_HOOK }}"
          elif [[ "${GITHUB_REF}" == refs/tags/v* ]]; then
            hook_url="${{ secrets.RENDER_PROD_DEPLOY_HOOK }}"
          else
            hook_url=""
          fi
          if [[ -n "$hook_url" ]]; then
            curl -X POST "$hook_url"
          else
            echo "No Render deploy hook configured for this ref: ${GITHUB_REF}"
          fi
          