version: "3.9"

services:
  db:
    image: postgres:16-alpine
    restart: unless-stopped
    environment:
      POSTGRES_USER: ${POSTGRES_USER:-expenseflow}
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD:-expenseflow}
      POSTGRES_DB: ${POSTGRES_DB:-expenseflow}
    ports:
      - "5432:5432"
    volumes:
      - postgres_data:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U ${POSTGRES_USER:-expenseflow}"]
      interval: 10s
      timeout: 5s
      retries: 5

  backend:
    build:
      context: ./backend
      dockerfile: Dockerfile
    restart: unless-stopped
    ports:
      - "8000:8000"
    environment:
      DATABASE_URL: postgresql://${POSTGRES_USER:-expenseflow}:${POSTGRES_PASSWORD:-expenseflow}@db:5432/${POSTGRES_DB:-expenseflow}
      SECRET_KEY: ${SECRET_KEY:-changeme}
      ENVIRONMENT: ${ENVIRONMENT:-dev}
    depends_on:
      db:
        condition: service_healthy

  frontend:
    build:
      context: ./frontend
      dockerfile: Dockerfile
    restart: unless-stopped
    ports:
      - "8501:8501"
    environment:
      API_URL: http://backend:8000
    depends_on:
      - backend

volumes:
  postgres_data:
